name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Validate tag matches pubspec version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PROJECT_VERSION=$(grep -oPm1 '(?<=version: ).*' pubspec.yaml)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match pubspec version ($PROJECT_VERSION)."
            exit 1
          fi

      - name: Get dependencies
        run: dart pub get

      - name: Run tests
        run: dart test
